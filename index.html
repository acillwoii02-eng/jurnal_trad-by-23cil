<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Trading Journal</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="sidebar">

<div class="logo">
<h2>TraderJournal</h2>
</div>

<ul>

<li class="active">Dashboard</li>

<li>Calendar</li>

<li>Trades</li>

<li>Journal</li>

<li>Reports</li>

<li>Notebook</li>

<li>Community</li>

<li>Settings</li>

</ul>

</div>

<div class="main">

<header>

<h1>Dashboard</h1>

<div class="profile">
<img src="assets/profile.png">
</div>

</header>

<div class="cards">

<div class="card green">

<h3>Total Profit</h3>

<h2>$12,450</h2>

</div>

<div class="card blue">

<h3>Win Rate</h3>

<h2>73%</h2>

</div>

<div class="card red">

<h3>Loss</h3>

<h2>$1,130</h2>

</div>

<div class="card orange">

<h3>Total Trade</h3>

<h2>142</h2>

</div>

</div>

<div class="chart">

<canvas id="profitChart"></canvas>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
